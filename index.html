<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EASY AI TRAINING</title>

<style>

body{
margin:0;
background:#f3f4f6;
font-family:Arial,Helvetica,sans-serif;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.header{
background:#111827;
color:white;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
border-radius:10px;

}

.video-box{
background:white;

}

.video-placeholder{
height:500px;
background:#000;
border-radius:10px;
display:flex;
justify-content:center;
align-items:center;
color:white;
font-size:26px;
}

.comments{
margin-top:20px;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 3px 15px rgba(0,0,0,.12);
}

.offer{

display:none;
background:#FFD54F;
padding:25px;
border-radius:10px;
text-align:center;
font-size:28px;
font-weight:bold;
}

button{
background:#16a34a;
color:white;
padding:18px 40px;
font-size:22px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<div class="header">

EASY AI TRAINING

<div class="video-box">

<iframe
    width="100%"
    height="600"
    src="https://www.youtube.com/embed/CtDrKS4uZFk?rel=0&modestbranding=1"

    frameborder="0"
    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"

<div class="comments">

<div class="offer">

JOIN NOW
